                    <div id="p1-label" class="text-white text-lg font-bold px-4 py-2 rounded-xl transition-all">X (Вы)</div>

                    <div id="p2-label" class="text-white text-lg font-bold px-4 py-2 rounded-xl transition-all opacity-40">O</div>

                <div id="board" class="grid grid-cols-3 gap-3">

                </div>

                <div id="status-msg" class="text-center mt-6 text-white/80 font-medium h-6">Ваш ход...</div>

            <div id="game-controls" class="hidden pt-6 space-y-3">
                <button onclick="resetGame()" class="w-full py-3 bg-white/10 hover:bg-white/20 text-white rounded-xl font-bold transition-colors">СБРОСИТЬ</button>
                <button onclick="showMenu()" class="w-full text-white/30 text-xs font-bold tracking-widest uppercase py-2">В главное меню</button>
            </div>

    <!-- Win Modal -->
    <div id="win-modal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/90 backdrop-blur-sm hidden">
        <div class="bg-indigo-600 p-8 rounded-[3rem] text-center w-full max-w-xs shadow-2xl border border-indigo-400">
            <div id="win-icon" class="text-6xl mb-4">🎉</div>
            <h2 id="win-title" class="text-white text-4xl font-black mb-2">ПОБЕДА!</h2>
            <p id="win-desc" class="text-indigo-100 mb-8 font-medium">Игрок X оказался сильнее.</p>
            <button onclick="closeModal()" class="w-full py-4 bg-white text-indigo-600 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-transform">ЕЩЕ РАЗ</button>
        </div>
    </div>

    <script>
        // SERVICE WORKER FOR OFFLINE
        const swContent = `
            const CACHE = 'ttt-pwa-v2';
            self.addEventListener('install', e => {
                e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', 'https://cdn.tailwindcss.com'])));
            });
            self.addEventListener('fetch', e => {
                e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
            });
        `;
        if ('serviceWorker' in navigator) {
            const blob = new Blob([swContent], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }

        // GAME ENGINE
        let board = Array(9).fill(null);
        let turn = 'X';
        let active = false;
        let mode = 'pvp';
        const winPatterns = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

        function initGame(m) {
            mode = m;
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('game-controls').classList.remove('hidden');
            document.getElementById('mode-text').innerText = m === 'pve' ? 'VS Computer' : '2 Players';
            resetGame();
        }

        function showMenu() {
            document.getElementById('menu-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('game-controls').classList.add('hidden');
        }

        function resetGame() {
            board = Array(9).fill(null);
            turn = 'X';
            active = true;
            render();
            updateUI();
        }

        function render() {
            const container = document.getElementById('board');
            container.innerHTML = '';
            board.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = `cell ${val ? 'occupied' : ''}`;
                if (val) {
                    const span = document.createElement('span');
                    span.className = 'symbol';
                    span.innerText = val;
                    span.style.color = val === 'X' ? '#818cf8' : '#fb7185';
                    cell.appendChild(span);
                }
                cell.onclick = () => handleMove(i);
                container.appendChild(cell);
            });
        }

        function handleMove(i) {
            if (!active || board[i]) return;
            executeMove(i);
            
            if (active && mode === 'pve' && turn === 'O') {
                active = false; // block input
                setTimeout(aiMove, 600);
            }
        }

        function executeMove(i) {
            board[i] = turn;
            render();
            if (checkWin()) return;
            if (board.every(s => s)) return endGame(null);
            
            turn = turn === 'X' ? 'O' : 'X';
            updateUI();
        }

        function aiMove() {
            const blanks = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
            if (blanks.length > 0) {
                active = true;
                executeMove(blanks[Math.floor(Math.random() * blanks.length)]);
            }
        }

        function checkWin() {
            for (let p of winPatterns) {
                if (board[p[0]] && board[p[0]] === board[p[1]] && board[p[0]] === board[p[2]]) {
                    active = false;
                    p.forEach(idx => document.getElementById('board').children[idx].classList.add('win'));
                    setTimeout(() => endGame(board[p[0]]), 600);
                    return true;
                }
            }
            return false;
        }

        function updateUI() {
            const p1 = document.getElementById('p1-label');
            const p2 = document.getElementById('p2-label');
            const msg = document.getElementById('status-msg');

            p1.style.opacity = turn === 'X' ? '1' : '0.4';
            p1.style.background = turn === 'X' ? 'rgba(79, 70, 229, 0.5)' : 'transparent';
            p2.style.opacity = turn === 'O' ? '1' : '0.4';
            p2.style.background = turn === 'O' ? 'rgba(225, 29, 72, 0.5)' : 'transparent';
            
            msg.innerText = turn === 'X' ? 'Ваш ход (X)...' : (mode === 'pve' ? 'Компьютер думает...' : 'Ход Ноликов (O)...');
        }

        function endGame(winner) {
            active = false;
            const modal = document.getElementById('win-modal');
            const title = document.getElementById('win-title');
            const desc = document.getElementById('win-desc');
            const icon = document.getElementById('win-icon');

            modal.classList.remove('hidden');
            if (winner) {
                title.innerText = winner === 'X' ? 'ПОБЕДА X!' : 'ПОБЕДА O!';
                desc.innerText = winner === 'X' ? 'Крестики оказались быстрее.' : 'Нолики взяли верх в этой партии.';
                icon.innerText = '🏆';
            } else {
                title.innerText = 'НИЧЬЯ';
                desc.innerText = 'Силы равны. Попробуйте еще раз!';
                icon.innerText = '🤝';
            }
        }

        function closeModal() {
            document.getElementById('win-modal').classList.add('hidden');
            resetGame();
        }

        // Prevent Pull-to-refresh on mobile
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, {passive: false});
    </script>
</body>
