<body>
    <div class="app-container">
        <div class="card bg-white/10 backdrop-blur-xl rounded-[2rem] p-6 sm:p-8 shadow-2xl border border-white/20 text-white text-center">
            <h1 class="text-3xl sm:text-4xl font-black mb-4 sm:mb-6 tracking-tight uppercase">Tic Tac Toe</h1>
            
            <!-- Выбор режима -->
            <div id="setup" class="flex-grow flex flex-col justify-center space-y-4">

                <button onclick="startGame('pvp')" class="w-full py-4 bg-white/10 hover:bg-white/20 rounded-2xl transition-all border border-white/20 font-bold text-lg">С другом</button>
                <button onclick="startGame('pve')" class="w-full py-4 bg-indigo-500 hover:bg-indigo-600 rounded-2xl transition-all shadow-lg font-bold text-lg">Против ИИ</button>
            </div>

            <!-- Игровое поле -->
            <div id="game-container" class="hidden flex-grow flex flex-col">
                <div class="flex justify-around items-center mb-6 bg-black/20 rounded-2xl py-3 px-2">
                    <div id="player-x" class="px-4 py-1 rounded-xl transition-all duration-300">Игрок X</div>
                    <div class="opacity-30">|</div>
                    <div id="player-o" class="px-4 py-1 rounded-xl transition-all duration-300">Игрок O</div>
                </div>

                <div id="board" class="grid grid-cols-3 gap-3">
                    <!-- Ячейки -->
                </div>

                <div id="status" class="mt-6 text-lg font-medium h-6 opacity-90 italic"></div>
                
                <div class="mt-auto pt-6 flex flex-col gap-3">
                    <button onclick="resetGame()" class="w-full py-3 bg-white text-indigo-700 font-black rounded-xl hover:bg-indigo-50 transition-colors shadow-lg active:scale-95">
                        СБРОСИТЬ
                    </button>
                    <button onclick="backToMenu()" class="text-xs uppercase tracking-widest opacity-50 hover:opacity-100 transition-opacity">
                        В меню
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно -->
    <div id="modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden flex items-center justify-center p-6 z-50">
        <div class="bg-white text-gray-900 p-8 rounded-[2.5rem] shadow-2xl w-full max-w-xs text-center transform scale-90 transition-all" id="modal-content">
            <div id="winner-icon" class="text-6xl mb-4 text-indigo-500">🏆</div>
            <h2 id="modal-title" class="text-3xl font-black mb-2 uppercase">Победа!</h2>
            <p id="modal-message" class="text-gray-500 mb-8 font-medium"></p>
            <button onclick="closeModal()" class="w-full py-4 bg-indigo-600 text-white font-black rounded-2xl hover:bg-indigo-700 shadow-xl active:scale-95 transition-transform">
                ИГРАТЬ СНОВА
            </button>
        </div>

    <script>
        // --- Offline Service Worker Logic ---
        const swCode = `
            const CACHE_NAME = 'ttt-v1';
            const ASSETS = [
                '/',
                'index.html',
                'https://cdn.tailwindcss.com'
            ];

            self.addEventListener('install', (e) => {
                e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(ASSETS)));
            });

            self.addEventListener('fetch', (e) => {
                e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
            });
        `;

        if ('serviceWorker' in navigator) {
            const blob = new Blob([swCode], { type: 'text/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).catch(console.error);
        }

        // --- Game Logic ---
        let board = Array(9).fill(null);
        let currentPlayer = 'X';
        let isGameActive = false;
        let gameMode = 'pvp';
        
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const playerXElement = document.getElementById('player-x');
        const playerOElement = document.getElementById('player-o');
        const setupElement = document.getElementById('setup');
        const gameContainer = document.getElementById('game-container');
        const modal = document.getElementById('modal');

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        function createBoard() {
            boardElement.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell bg-white/5 rounded-2xl flex items-center justify-center text-4xl font-black cursor-pointer border border-white/5';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                boardElement.appendChild(cell);
            }
        }

        function startGame(mode) {
            gameMode = mode;
            setupElement.classList.add('hidden');
            gameContainer.classList.remove('hidden');
            resetGame();
        }

        function backToMenu() {
            setupElement.classList.remove('hidden');
            gameContainer.classList.add('hidden');
        }

        function handleCellClick(index) {
            if (!isGameActive || board[index] !== null) return;
            makeMove(index);
            if (isGameActive && gameMode === 'pve' && currentPlayer === 'O') {
                isGameActive = false;
                setTimeout(aiMove, 500);
            }
        }

        function makeMove(index) {
            board[index] = currentPlayer;
            const cell = boardElement.children[index];
            cell.innerText = currentPlayer;
            cell.classList.add('occupied', 'symbol-enter');
            cell.style.color = currentPlayer === 'X' ? '#a5b4fc' : '#fda4af';

            if (checkWin()) {
                endGame(false);
            } else if (board.every(c => c !== null)) {
                endGame(true);
            } else {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                updateStatus();
                isGameActive = true;
            }
        }

        function aiMove() {
            if (!isGameActive && board.every(c => c !== null)) return;
            const emptyCells = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
            if (emptyCells.length > 0) {
                const randomIdx = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                isGameActive = true;
                makeMove(randomIdx);
            }
        }

        function checkWin() {
            for (let cond of winningConditions) {
                const [a, b, c] = cond;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    cond.forEach(idx => boardElement.children[idx].classList.add('winning-cell'));
                    return true;
                }
            }
            return false;
        }

        function updateStatus() {
            statusElement.innerText = `Ход ${currentPlayer === 'X' ? 'Крестиков' : 'Ноликов'}`;
            playerXElement.className = `px-4 py-1 rounded-xl transition-all duration-300 ${currentPlayer === 'X' ? 'bg-indigo-500 font-bold' : 'opacity-50'}`;
            playerOElement.className = `px-4 py-1 rounded-xl transition-all duration-300 ${currentPlayer === 'O' ? 'bg-rose-500 font-bold' : 'opacity-50'}`;
        }

        function endGame(draw) {
            isGameActive = false;
            const title = document.getElementById('modal-title');
            const msg = document.getElementById('modal-message');
            const icon = document.getElementById('winner-icon');

            if (draw) {
                title.innerText = 'Ничья';
                msg.innerText = 'Никто не победил. Попробуйте еще раз!';
                icon.innerText = '🤝';
            } else {
                title.innerText = 'Победа!';
                msg.innerText = `Игрок ${currentPlayer} разгромил соперника!`;
                icon.innerText = '🏆';
            }
            
            setTimeout(() => {
                modal.classList.remove('hidden');
                document.getElementById('modal-content').style.transform = 'scale(1)';
            }, 500);
        }

        function closeModal() {
            modal.classList.add('hidden');
            document.getElementById('modal-content').style.transform = 'scale(0.9)';
            resetGame();
        }

        function resetGame() {
            board = Array(9).fill(null);
            currentPlayer = 'X';
            isGameActive = true;
            createBoard();
            updateStatus();
        }

        createBoard();
    </script>
</body>
</html>
